# EXAMPLE config — copy to config/profile.yaml and fill in your profile.
#   cp config/profile.example.yaml config/profile.yaml
# Everything below the `profile:` block is ready-to-run defaults; edit to taste.
# Tip: `schabasch candidate --cv-path <your_cv.pdf>` extracts a structured skills
# profile from your CV (used for CV↔vacancy fit). magnets/repellents are your
# DESIRED / DISLIKED domains (aspirational is fine), NOT necessarily your background.

profile:
  summary: >
    FILL IN YOUR PROFILE — one paragraph in your own words: role / seniority,
    background, location, languages (your working language + any you're learning),
    your core skills (fit is scored against these), the kinds of roles that suit
    you, and any company / industry preferences. The richer this is, the better
    the matching.
  magnets:   [space, animals, public-sector, complex-projects, new-domain]   # domains you WANT
  repellents: [remote-only, temp-agency, boring-role, slop-text]             # deal-breakers / turn-offs
  scale:
    "5": "Dream job: a strong magnet domain + your target-city hybrid + working-language team + good fit"
    "4": "Almost: a good domain or strong company, one minus"
    "3": "Just a job: neutral domain, workable location, nothing special"
    "2": "Has a killer: hidden language requirement, disliked industry, remote-only, staffing agency"
    "1": "Office mouse: native-language wall + boring role + buzzwords + no upside"

search:
  queries_en:
    - machine learning engineer
    - data scientist
    - systems engineer
    - process engineer
    - program manager
    - project manager
    - software engineer
    - research engineer
    - aerospace engineer
    - defense systems
  queries_de:
    - Ingenieur Raumfahrt
    - Verteidigung Ingenieur
    - Systementwickler
    - Prozessingenieur
    - Projektmanager
    - Softwareentwickler
    - öffentlicher Dienst Ingenieur
    - Datenwissenschaftler
  cities: ["Heidelberg, Germany", "Frankfurt am Main, Germany"]
  hours_old: 48
  # linkedin_hours_old: 24   # ECONOMY (opt-in): tighter LinkedIn window → fewer/fresher jobs, ~half
                             #   the LinkedIn re-fetch time. Unset = use hours_old.
  results_wanted: 25
  sources: [indeed, linkedin, arbeitsagentur]   # jobspy also supports: glassdoor (add to try it)
  agent_discovery: false   # opt-in ReAct web crawl — low yield with local qwen3:8b (needs SearXNG
                           # / a stronger model to be productive); board scrapers do the real work
  # target_companies: []   # optional override for the employers the discovery agent targets
  # --- funnel-expansion sources (2026-07 research; all keyless, all opt-in) ---
  social: false            # person-posts: Bluesky search + Mastodon hashtag timelines + Telegram
                           #   public-channel previews (t.me/s/). Hard keyword gate before the LLM.
  # social_instances: [mastodon.social, hachyderm.io, mastodon.online]
  # social_hashtags: [hiring, fedihire, getfedihired]
  # telegram_channels: [germantechjobs, jobinberlin]   # public handles polled via t.me/s/<handle>
                           #   (both live-verified 2026-07-03; check new ones: curl https://t.me/s/<handle>)
  hn_hiring: false         # monthly "Ask HN: Who is hiring?" thread (structurally person-posted;
                           #   dev/US-skewed — filtered to cfg cities + Germany/EU/Remote mentions)
  ats: false               # direct ATS boards (greenhouse/lever/ashby/personio/workable/recruitee/
                           #   smartrecruiters) — public JSON/XML, no keys, no anti-bot
  # ats_companies: []      # companies to probe for public ATS boards (falls back to target_companies)

geo:
  anchors:
    Heidelberg: {lat: 49.3988, lon: 8.6724, radius_km: 40}
    Frankfurt:  {lat: 50.1109, lon: 8.6821, radius_km: 40}

llm:
  normalizer_model: "qwen3:8b"
  judge_model: "qwen3:8b"
  num_ctx: 8192
  temperature: 0.1
  desc_truncate_chars: 6000
  nightly_normalize_budget: 150
  # Cascade roles (schabasch/llm_clients.py::make_llm_client). Each role → a client.
  # Defaults keep everything on local ollama so it runs out of the box. deep_reasoning / sota / a
  # local MLX agent are OPT-IN upgrades, used only when reachable (else they fall back to ollama).
  # env_file: path/to/.env   # optional: a file holding OPENAI_API_KEY for the opt-in `sota` tier
  roles:
    normalizer: {client: ollama, model: "qwen3:8b"}
    judge:      {client: ollama, model: "qwen3:8b"}
    candidate:  {client: ollama, model: "qwen3:8b"}
    # agent (investigate/discover, multi-turn ReAct). Default = ollama qwen3:8b so it runs out of the box.
    # Optional upgrade: a local MLX 35B served via `bash scripts/serve_mlx.sh` on :8082 (OpenAI-compat) —
    #   then set: {client: openai, model: <your-mlx-model>, base_url: "http://localhost:8082/v1", api_key: "ollama"}
    agent:      {client: ollama, model: "qwen3:8b"}
    # deep_reasoning DEFAULT = local ollama qwen3.5:4b (fast, ~3.4 GB, profile-aware pros/cons).
    deep_reasoning: {client: ollama, model: "qwen3.5:4b"}
    # sota = opt-in remote tier (any OpenAI-compatible provider); needs OPENAI_API_KEY (never stored).
    # Falls back to ollama if absent.
    sota: {client: openai, model: "sota", base_url: "https://api.example.com/v1",
           api_key_env: "OPENAI_API_KEY", max_tokens: 16000, timeout_s: 300}

deep:                          # W3 abstractive card-enrichment (pros/cons + deep company + slop re-parse)
  enable: true
  slop_escalate_thr: 60        # (retained for reference; escalation removed — see enable_sota)
  enable_sota: false           # escalation stays WITHIN small local models (no remote sota, no 35B
                               # co-load); enrichment = single small tier + ollama reliability fallback
  enrich_top_n: 12             # enrich only the daily slate set (cap) — keeps the heavy models off the pool

memory:                        # Apple-silicon swap safety for the UI /fetch worker (schabasch/memory_guard.py)
  guard_enabled: true
  hard_floor_pct: 10           # refuse to start a heavy stage below this % free RAM
  soft_floor_pct: 20           # warn / background-yield threshold
  watchdog_interval_seconds: 15
  swap_growth_floor_mb: 512    # CAPA: watchdog also flags pressure when swap GROWS >N MB/sample
                               #   (growth-delta; macOS free-RAM% is blind to swap saturation). 0 = off.

judge:
  rubric_version: "v3-example"
  fewshot_max: 6

slate:
  exploit: 8
  explore: 2
  max_per_company: 3
  port: 8787
  fresh_days: 14            # daily slate shows only jobs re-seen (last_seen) within N days — keeps it
                            # current. /annotate is exempt (keeps the full backlog for labeling).
  max_reshows: 2            # de-dup: a vacancy you already RATED is never re-served; a shown-but-unrated
                            #   one may reappear at most this many days before it decays out.
  investigate_top_n: 6      # deep-search (agent) runs on the top-N SCORED cards each tick
  annotate_batch: 30        # /annotate queue: max judged-but-unrated cards per page (cold-start chunk)
  eval_min_pairs: 15        # /eval: below this many comparable label-pairs the page warns metrics are noisy
  triage_blend: 0.5
  xenc_blend: 0.3
  # EFFECTIVE (slate sort) = fit_score · (1 + judge_blend_beta·judge_norm) · elig_score (de-conflate:
  # fit leads, the magnet judge tie-breaks). Raise judge_blend_beta once enough 4/5 labels accrue.
  judge_blend_beta: 0.0
  # cov_weight (λ): blend honest per-requirement coverage into the headline — fit_eff = (1-λ)·fit + λ·llm_cov.
  # MEASURED 2026-06-16: λ>0 REGRESSED the real-label fit (pairwise 0.862→~0.76) — the labels reward
  # aspiration-magnet jobs, so coverage-blending disagrees with them. Kept OFF (λ=0); see docs/MATCHING_SOTA.md.
  cov_weight: 0.0
  # 0%-skill floor: a job where you meet ZERO extracted hard requirements (llm_cov==0) is multiplied
  # down (out of the exploit slots) however high its magnet/semantic fit. 1.0 = off. MEASURED 2026-06-16:
  # 0.0 improved the real-label guardrail (0.862→0.871) — a HARD rule at exactly-0, unlike the cov BLEND.
  zero_cov_mult: 1.0
  # role_kind_mult: static down-rank per role kind (hands_on_engineer/junior/lead). LEARNING (P2) can
  # replace these from the user's 🙅 'wrong role' votes once enough accrue:
  role_kind_learn:
    enabled: false          # OFF until the role-fit votes accrue + the eval guardrail proves no regression
    n_min: 5                # golden role votes per kind before the learned rate overrides the static default
    alpha: 3.0              # Beta/shrink prior strength (smaller = trust real votes faster)
    mult_floor: 0.5         # recall-first: a fully-disliked kind never hard-drops below this
  quality_floor: 0.37       # an exploit slot must clear this `effective` score (below-floor → explore only,
                            #   never hidden). Thin day → fewer cards, not junk padding. The role-kind mult
                            #   (not the floor) excludes engineers; keep the floor below the engineer cap.
  fit_gate_floor: 0.25      # legacy (old judge-led gate); used only by the eval synthetic-GOLD path
  hyre_blend: 0.1
  fit_warn_threshold: 0.4   # below this, the card shows a ⚠ "big skill gap" note
  # FRESHNESS RE-RANK: slate sort key = effective · (floor + (1-floor)·0.5^(days_posted/halflife)).
  # REORDERS only (effective + quality_floor stay pure fit) → fresh-slightly-worse beats stale-great
  # without disqualifying it; /eval preserved (no live dates → recency neutral). floor 1.0 = off.
  recency_halflife_days: 7  # today×1.0, 7d×0.80, 14d×0.70, old→floor
  recency_floor: 0.6        # oldest jobs keep 60% of rank weight

serve:                      # `schabasch serve` startup behavior
  fetch_on_start: true      # retrain (checkpointing the previous model) + full fetch on every start,
                            #   with an immediate existing slate when possible. `serve --no-fetch` skips it.
  fast_ready: true          # expose an already-scored slate immediately; the fresh high-quality fetch
                            #   continues in the background. Cold DBs still wait for the first slate.
  refetch_after_hours: 12   # but SKIP the startup fetch if one completed within this many hours (a
                            #   quick restart reuses the recent slate). 0 = always fetch; `--refetch` forces.
  investigate_seed: 2       # investigate the top-N cards before greeting; the rest enrich on-the-go.

telegram:                   # optional Telegram bot (separate repo schabasch-tg-bot, pip install -e it)
  enabled: false            # true → `schabasch serve` also spawns `python -m schabasch_bot`
  token: ""                 # BotFather token (or set the TELEGRAM_BOT_TOKEN env var instead)
  chat_id: 0                # 0 = auto-lock: the FIRST chat to /start claims the bot (then /reset to free).
                            #   Set a specific id to hard-lock to that chat instead (prod / golden labels).
  chat_id_debug: 0          # the chat `serve --dry` locks to (you, while debugging — feedback not persisted).

triage:
  cutoffs: {must: 4.5, should: 3.5, could: 2.0}
  drop_priorities: [drop]
  min_labels_to_train: 30
  audit_sample_per_tick: 1

features:
  model: "BAAI/bge-m3"
  reranker: "BAAI/bge-reranker-v2-m3"
  torch_num_threads: 1         # CAPA: cap torch's OpenMP intra-op pool (1 = inline, no pool, can't
                               #   deadlock). The features stage deadlocked on the tick thread —
                               #   parallel copy_kernel hung in _pthread_cond_wait. Raise on a roomy box.
  rerank_top_k: 30
  coverage_tau: 0.6
  esco_csv: null
  # Headline fit = HyRE (ideal-résumé cosine) co-led with the bge-m3 SPARSE-lexical signal; both are
  # stable anchors (sparse is deterministic). llm_cov is computed + shown as the card ✓/◐/✗ breakdown
  # but dropped from the headline blend. Weights below were tuned on real labels; retune on yours.
  fit_weights: {hyre: 0.7, sparse: 0.3}
  sparse_norm: 0.45                # maps the bge-m3 sparse score (≈[0.03,0.45]) to ≈[0,1] (clamped)
  hybrid_sparse: true              # compute the bge-m3 sparse-lexical hybrid signal in rerank_scored
  llm_cov: true                    # qwen per-requirement coverage (cached) — card breakdown only now
  hyre: true                       # HyRE = ideal-résumé cosine — co-leads the headline fit with sparse
  eligibility: true                # extract HARD JD requirements (qwen, cached) → eligibility gate

eligibility:                       # hard-qualification gate (education/PhD/credentials/language)
  floor: 0.35    # multiplier for a clear hard miss (e.g. PhD-role w/o Master) → sinks to explore
  hard_blockers: []   # deterministic JD regexes for legal barriers you can't meet (e.g. a foreign
                      #   security clearance / citizenship) → STRUCTURAL floor. [] = off. Example:
                      #   ["\\b(TS/SCI|security clearance)\\b", "\\bU\\.?S\\.? citizen"]
  mid: 0.6       # multiplier for a single-step gap (e.g. needs Master, has Bachelor; lang one below)
  soft_lift_threshold: 0.55  # a SOFT (prose-degree) gap is lifted to 1.0 when fit_score ≥ this.
                             #   Structural blockers (PhD position, hard non-EN language) are NEVER lifted.
  soft_lift_cov_min: 0.0     # also require llm_cov ≥ this for the lift (gate aspiration-inflated fit).
                             #   MEASURED 2026-06-16: >0 didn't beat baseline on real labels → kept 0 (off).

investigate:                 # persistent employer knowledge base — research a company ONCE, reuse
                             # durable facts on future vacancies + ticks; only fresh news/reputation
                             # is re-asked past its TTL. investigate_top skips already-investigated jobs.
  company_facts_ttl_days: 90
  company_news_enabled: true
  company_news_refresh_days: 30

browsing:                    # keyless web (agent WebSearchTool + schabasch/browsing/ adapters)
  search_backend: ddg        # ddg (keyless) | searx (set searxng_url). NEVER tavily (no API keys)
  searxng_url: null          # self-hosted SearXNG → multi-engine; null → keyless DuckDuckGo
  wikidata_enabled: true     # typed company entity resolution (browsing.entity.resolve)

agent:                       # bounds per ReAct agent run (discover + investigate) — stop runaway
  max_turns: 6
  max_tool_calls: 6          # web_search/web_fetch calls; each fetch floods context with page text
  max_wall_time_seconds: 120 # hard wall-clock cap per run
  max_input_tokens: 60000    # hard input-token cap (observation accumulation)

paths:
  db: data/schabasch.sqlite3
  golden_csv: data/golden/golden.csv
  slate_dir: data/slates
  model_dir: data/models
  agent_workdir: data/agent
